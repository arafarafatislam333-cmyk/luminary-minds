<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Luminary Minds - Chapters</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Hind+Siliguri:wght@400;500;600;700&family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root {
            --primary: #4F46E5;
            --primary-light: #EEF2FF;
            --success: #10B981;
            --success-light: #ECFDF5;
            --text-main: #1F2937;
            --text-muted: #6B7280;
            --bg-body: #F9FAFB;
            --bg-card: #FFFFFF;
            --shadow-sm: 0 2px 4px rgba(0,0,0,0.02);
            --shadow-md: 0 4px 6px -1px rgba(0,0,0,0.05);
            --radius-md: 16px;
            --radius-lg: 24px;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: 'Poppins', 'Hind Siliguri', sans-serif;
            background-color: var(--bg-body);
            color: var(--text-main);
            display: flex;
            justify-content: center;
            align-items: flex-start;
            min-height: 100vh;
        }

        /* Mobile Container */
        .app-container {
            width: 100%;
            max-width: 450px;
            background-color: var(--bg-card);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            position: relative;
            box-shadow: 0 0 20px rgba(0,0,0,0.03);
            overflow-x: hidden;
        }

        /* Sub-page Header with Back Button */
        .sub-header {
            display: flex;
            align-items: center;
            gap: 16px;
            padding: 16px 20px;
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(12px);
            position: sticky;
            top: 0;
            z-index: 100;
            border-bottom: 1px solid rgba(0,0,0,0.03);
        }

        .back-btn {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: #F3F4F6;
            display: flex;
            justify-content: center;
            align-items: center;
            color: var(--text-main);
            text-decoration: none;
            font-size: 18px;
            transition: background 0.2s;
        }

        .back-btn:active {
            background: #E5E7EB;
        }

        .page-title {
            font-size: 19px;
            font-weight: 700;
            color: var(--text-main);
        }

        /* Chapter List Section */
        .chapter-container {
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .chapter-card {
            background: var(--bg-card);
            border: 1px solid #E5E7EB;
            border-radius: var(--radius-md);
            padding: 18px;
            box-shadow: var(--shadow-sm);
            transition: transform 0.2s, box-shadow 0.2s;
        }

        .chapter-card:active {
            transform: scale(0.98);
            box-shadow: var(--shadow-md);
        }

        .chapter-header {
            margin-bottom: 14px;
        }

        .chapter-number {
            font-size: 13px;
            color: var(--primary);
            font-weight: 600;
            margin-bottom: 4px;
            display: inline-block;
            background: var(--primary-light);
            padding: 2px 10px;
            border-radius: 8px;
        }

        .chapter-title {
            font-size: 17px;
            font-weight: 700;
            color: var(--text-main);
            margin-top: 6px;
        }

        /* Progress Bar */
        .progress-wrapper {
            margin-bottom: 18px;
        }

        .progress-info {
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 13px;
            font-weight: 600;
            color: var(--text-muted);
            margin-bottom: 8px;
        }

        .progress-bar-bg {
            width: 100%;
            height: 6px;
            background: #F3F4F6;
            border-radius: 10px;
            overflow: hidden;
        }

        .progress-bar-fill {
            height: 100%;
            background: var(--primary);
            border-radius: 10px;
        }

        /* Action Button */
        .start-learning-btn {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 8px;
            width: 100%;
            padding: 12px;
            background: var(--primary);
            color: white;
            text-decoration: none;
            border-radius: 12px;
            font-size: 15px;
            font-weight: 600;
            transition: opacity 0.2s;
        }

        .start-learning-btn:active {
            opacity: 0.85;
        }

        /* Status Variations */
        .status-completed .progress-bar-fill { background: var(--success); }
        .status-completed .chapter-number { color: var(--success); background: var(--success-light); }
        .status-completed .start-learning-btn { background: var(--success-light); color: var(--success); border: 1px solid var(--success-light); }
        
        .status-not-started .progress-bar-fill { width: 0%; }
        .status-not-started .start-learning-btn { background: var(--primary-light); color: var(--primary); }

    </style>
</head>
<body>

    <div class="app-container">
        
        <header class="sub-header">
            <a href="subject.html" class="back-btn">
                <i class="fa-solid fa-arrow-left"></i>
            </a>
            <h1 class="page-title">অধ্যায় সমূহ</h1>
        </header>

        <div class="chapter-container">
            
            <div class="chapter-card status-completed">
                <div class="chapter-header">
                    <span class="chapter-number">অধ্যায় ১</span>
                    <h3 class="chapter-title">উন্নততর জীবনধারা</h3>
                </div>
                <div class="progress-wrapper">
                    <div class="progress-info">
                        <span>সম্পন্ন হয়েছে</span>
                        <span>১০০%</span>
                    </div>
                    <div class="progress-bar-bg">
                        <div class="progress-bar-fill" style="width: 100%;"></div>
                    </div>
                </div>
                <a href="notes.html" class="start-learning-btn">
                    <i class="fa-solid fa-rotate-left"></i> রিভিশন দাও
                </a>
            </div>

            <div class="chapter-card">
                <div class="chapter-header">
                    <span class="chapter-number">অধ্যায় ২</span>
                    <h3 class="chapter-title">জীবনের জন্য পানি</h3>
                </div>
                <div class="progress-wrapper">
                    <div class="progress-info">
                        <span>চলমান...</span>
                        <span style="color: var(--primary);">৬০%</span>
                    </div>
                    <div class="progress-bar-bg">
                        <div class="progress-bar-fill" style="width: 60%;"></div>
                    </div>
                </div>
                <a href="notes.html" class="start-learning-btn">
                    <i class="fa-solid fa-play"></i> পড়া চালিয়ে যাও
                </a>
            </div>

            <div class="chapter-card status-not-started">
                <div class="chapter-header">
                    <span class="chapter-number">অধ্যায় ৩</span>
                    <h3 class="chapter-title">হৃদযন্ত্রের যত কথা</h3>
                </div>
                <div class="progress-wrapper">
                    <div class="progress-info">
                        <span>শুরু করা হয়নি</span>
                        <span>০%</span>
                    </div>
                    <div class="progress-bar-bg">
                        <div class="progress-bar-fill"></div>
                    </div>
                </div>
                <a href="notes.html" class="start-learning-btn">
                    <i class="fa-solid fa-book-open"></i> পড়া শুরু করো
                </a>
            </div>

            <div class="chapter-card status-not-started">
                <div class="chapter-header">
                    <span class="chapter-number">অধ্যায় ৪</span>
                    <h3 class="chapter-title">নবজীবন</h3>
                </div>
                <div class="progress-wrapper">
                    <div class="progress-info">
                        <span>শুরু করা হয়নি</span>
                        <span>০%</span>
                    </div>
                    <div class="progress-bar-bg">
                        <div class="progress-bar-fill"></div>
                    </div>
                </div>
                <a href="notes.html" class="start-learning-btn">
                    <i class="fa-solid fa-book-open"></i> পড়া শুরু করো
                </a>
            </div>

        </div>

    </div>

</body>
</html>
